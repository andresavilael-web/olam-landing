<!-- @dsCard group="Colors" viewport="700x170" name="Surfaces & Logo Green" subtitle="Semantic surface scale — and the green that lives ONLY in the logo." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--surface-card); color: var(--text-body); }
  .row { display: flex; gap: 12px; padding: 20px; }
  .sw { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .chip { height: 58px; border-radius: var(--radius-md); border: 1px solid var(--border-hairline); }
  .name { font-size: 11px; font-weight: 500; color: var(--text-body); }
  .hex { font-size: 10px; color: var(--text-subtle); font-variant-numeric: tabular-nums; }
  .lock { position: relative; }
  .lock::after { content: "logo only"; position: absolute; top: 6px; left: 6px; font-size: 8px; letter-spacing: .08em; text-transform: uppercase; color: #fff; background: rgba(0,0,0,.45); padding: 2px 6px; border-radius: 99px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--surface-page)"></div><span class="name">page</span><span class="hex">#FFFFFF</span></div>
    <div class="sw"><div class="chip" style="background:var(--surface-linen)"></div><span class="name">linen panel</span><span class="hex">#F8F3EA</span></div>
    <div class="sw"><div class="chip" style="background:var(--surface-mist)"></div><span class="name">mist band</span><span class="hex">#F4F7F8</span></div>
    <div class="sw"><div class="chip" style="background:var(--surface-slate);border-color:transparent"></div><span class="name">slate band</span><span class="hex">#6E8CA3</span></div>
    <div class="sw"><div class="chip" style="background:var(--surface-ink);border-color:transparent"></div><span class="name">ink section</span><span class="hex">#1F2020</span></div>
    <div class="sw"><div class="chip lock" style="background:var(--logo-green);border-color:transparent"></div><span class="name">logo green</span><span class="hex">#7AB520</span></div>
  </div>
</body>
</html>
