<!-- @dsCard group="Colors" viewport="700x160" name="Ink & Slate" subtitle="Charcoal text & dark sections; slate for bands with white text." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--surface-card); color: var(--text-body); }
  .row { display: flex; gap: 12px; padding: 20px; }
  .sw { flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .chip { height: 64px; border-radius: var(--radius-md); border: 1px solid var(--border-hairline); }
  .name { font-size: 11px; font-weight: 500; color: var(--text-body); }
  .hex { font-size: 11px; color: var(--text-subtle); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--charcoal);border-color:transparent"></div><span class="name">charcoal · text/dark</span><span class="hex">#1F2020</span></div>
    <div class="sw"><div class="chip" style="background:var(--charcoal-soft);border-color:transparent"></div><span class="name">body text</span><span class="hex">#3A3D3D</span></div>
    <div class="sw"><div class="chip" style="background:var(--warm-grey);border-color:transparent"></div><span class="name">muted</span><span class="hex">#6E7273</span></div>
    <div class="sw"><div class="chip" style="background:var(--slate);border-color:transparent"></div><span class="name">slate · bands</span><span class="hex">#6E8CA3</span></div>
    <div class="sw"><div class="chip" style="background:var(--warm-grey-2);border-color:transparent"></div><span class="name">subtle</span><span class="hex">#9AA0A0</span></div>
  </div>
</body>
</html>
