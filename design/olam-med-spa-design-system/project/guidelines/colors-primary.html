<!-- @dsCard group="Colors" viewport="700x150" name="Action — Olam Blue" subtitle="Deep blue from the logo. The single action / CTA color." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--surface-card); color: var(--text-body); }
  .row { display: flex; gap: 12px; padding: 20px; }
  .sw { flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .chip { height: 64px; border-radius: var(--radius-md); border: 1px solid var(--border-hairline); }
  .name { font-size: 11px; font-weight: 500; color: var(--text-body); }
  .hex { font-size: 11px; color: var(--text-subtle); font-variant-numeric: tabular-nums; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--action-tint)"></div><span class="name">tint</span><span class="hex">#EAF1F4</span></div>
    <div class="sw"><div class="chip" style="background:var(--mist-blue)"></div><span class="name">mist blue · detail</span><span class="hex">#8FA7B6</span></div>
    <div class="sw"><div class="chip" style="background:var(--olam-blue);border-color:transparent"></div><span class="name">Olam blue · ACTION</span><span class="hex">#1F5E78</span></div>
    <div class="sw"><div class="chip" style="background:var(--olam-blue-hover);border-color:transparent"></div><span class="name">hover</span><span class="hex">#18506A</span></div>
    <div class="sw"><div class="chip" style="background:var(--olam-blue-press);border-color:transparent"></div><span class="name">pressed</span><span class="hex">#123F54</span></div>
  </div>
</body>
</html>
