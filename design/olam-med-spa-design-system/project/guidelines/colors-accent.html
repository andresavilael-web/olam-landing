<!-- @dsCard group="Colors" viewport="700x160" name="Warm Neutrals" subtitle="White dominant; linen & mist are gentle warm/cool grounds." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--surface-card); color: var(--text-body); }
  .row { display: flex; gap: 12px; padding: 20px; }
  .sw { flex: 1; display: flex; flex-direction: column; gap: 8px; }
  .chip { height: 64px; border-radius: var(--radius-md); border: 1px solid var(--border-hairline); }
  .name { font-size: 11px; font-weight: 500; color: var(--text-body); }
  .hex { font-size: 11px; color: var(--text-subtle); font-variant-numeric: tabular-nums; }
  .note { padding: 0 20px 16px; font-size: 11px; color: var(--text-subtle); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--white)"></div><span class="name">white · dominant</span><span class="hex">#FFFFFF</span></div>
    <div class="sw"><div class="chip" style="background:var(--linen)"></div><span class="name">linen · warm</span><span class="hex">#F8F3EA</span></div>
    <div class="sw"><div class="chip" style="background:var(--mist-5)"></div><span class="name">mist 5% · soft</span><span class="hex">#F4F7F8</span></div>
    <div class="sw"><div class="chip" style="background:var(--champagne);border-color:transparent"></div><span class="name">champagne · threads</span><span class="hex">#C8B78F</span></div>
  </div>
  <p class="note">Proportion: white manda · linen a light warm touch · mist 5% on soft section grounds · champagne only as thin metallic lines.</p>
</body>
</html>
