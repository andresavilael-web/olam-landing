<!-- @dsCard group="Type" viewport="700x280" name="Heading Scale" subtitle="H1–H4 in Cormorant Garamond, with italic-accent emphasis." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--surface-card); color: var(--text-strong); }
  .wrap { padding: 24px 32px; display: flex; flex-direction: column; gap: 14px; }
  .line { display: flex; align-items: baseline; gap: 16px; border-bottom: 1px solid var(--border-hairline); padding-bottom: 12px; }
  .line:last-child { border-bottom: none; }
  .tag { font-family: var(--font-body); font-size: 10px; color: var(--text-subtle); width: 92px; flex: none;
    text-transform: uppercase; letter-spacing: var(--ls-wide); }
  .s { font-family: var(--font-display); font-weight: 500; letter-spacing: var(--ls-tight); line-height: 1.1; }
  .s i { font-weight: 500; font-style: italic; color: var(--text-accent); }
  .h1 { font-size: var(--text-h1); }
  .h2 { font-size: var(--text-h2); }
  .h3 { font-size: var(--text-h3); }
  .h4 { font-size: var(--text-h4); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="line"><span class="tag">H1 · 40–64</span><span class="s h1">Collective expertise.</span></div>
    <div class="line"><span class="tag">H2 · 32–52</span><span class="s h2">What real results <i>look like.</i></span></div>
    <div class="line"><span class="tag">H3 · 24</span><span class="s h3">Definición del óvalo facial</span></div>
    <div class="line"><span class="tag">H4 · 18</span><span class="s h4">Elevación natural del pómulo</span></div>
  </div>
</body>
</html>
