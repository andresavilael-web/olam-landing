<!-- @dsCard group="Type" viewport="700x240" name="Display — Cormorant Garamond" subtitle="Editorial serif headlines; italic emphasis on emotional words." -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--surface-card); color: var(--text-strong); }
  .wrap { padding: 28px 32px; }
  .eyebrow { font-family: var(--font-body); font-size: var(--text-label); font-weight: 600;
    text-transform: uppercase; letter-spacing: var(--ls-label); color: var(--text-accent); margin: 0 0 16px; }
  h1 { font-family: var(--font-display); font-weight: 500; font-size: var(--text-display);
    line-height: var(--lh-display); letter-spacing: var(--ls-display); margin: 0; }
  h1 i { font-weight: 500; font-style: italic; color: var(--text-accent); }
  .meta { margin-top: 18px; font-size: 11px; color: var(--text-subtle); }
</style>
</head>
<body>
  <div class="wrap">
    <p class="eyebrow">La nueva belleza natural</p>
    <h1>Tighten and lift your skin, <i>naturally.</i></h1>
    <p class="meta">Cormorant Garamond · 500 / 500 italic · clamp(3rem → 5.5rem) · line-height 1.02</p>
  </div>
</body>
</html>
